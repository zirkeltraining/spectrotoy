<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC100-2S Spectrometer Diagnostic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            padding: 30px;
            min-height: 600px;
        }

        .resizable-divider {
            grid-column: 1 / 3;
            position: absolute;
            width: 4px;
            height: 100%;
            cursor: col-resize;
            background: linear-gradient(90deg, transparent 0%, #667eea 50%, transparent 100%);
            opacity: 0;
            transition: opacity 0.2s;
            left: 320px;
            top: auto;
            z-index: 100;
        }

        .resizable-divider:hover,
        .resizable-divider.dragging {
            opacity: 1;
            background: linear-gradient(90deg, transparent 0%, #667eea 50%, transparent 100%);
        }

        .main-content-wrapper {
            display: grid;
            grid-template-columns: 300px 4px 1fr;
            gap: 0;
            padding: 30px;
            min-height: 600px;
            position: relative;
        }

        .control-panel {
            grid-column: 1;
        }

        .resizable-divider {
            grid-column: 2;
            cursor: col-resize;
            background: linear-gradient(90deg, transparent 0%, #ccc 50%, transparent 100%);
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
        }

        .resizable-divider:hover,
        .resizable-divider.dragging {
            opacity: 1;
            background: linear-gradient(90deg, transparent 0%, #667eea 50%, transparent 100%);
        }

        .content-area {
            grid-column: 3;
        }

        .control-panel {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #e9ecef;
            height: fit-content;
        }

        .control-panel h2 {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: #333;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.95em;
        }

        .control-group input,
        .control-group select,
        .control-group button {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95em;
        }

        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: #667eea;
            color: white;
            cursor: pointer;
            border: none;
            font-weight: 600;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-1px);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .status-indicator.disconnected {
            background: #dc3545;
        }

        .status-indicator.connected {
            background: #28a745;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-size: 0.9em;
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 4px;
            border-left: 4px solid #ffc107;
            color: #333;
        }

        .content-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chart-container {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            flex: 1;
            min-height: 400px;
            position: relative;
        }

        .chart-container h2 {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #333;
        }

        #spectrumChart {
            max-height: 350px;
        }

        .info-panel {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        .info-card {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .info-card h3 {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-card .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .info-card .unit {
            font-size: 0.8em;
            color: #999;
            margin-top: 4px;
        }

        .log-container {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.85em;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-left: 3px solid #ddd;
            padding-left: 10px;
        }

        .log-entry.command {
            border-left-color: #667eea;
            color: #667eea;
            font-weight: 600;
        }

        .log-entry.response {
            border-left-color: #28a745;
            color: #28a745;
        }

        .log-entry.error {
            border-left-color: #dc3545;
            color: #dc3545;
        }

        .log-entry.info {
            border-left-color: #17a2b8;
            color: #17a2b8;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .button-group button {
            margin: 0;
        }

        .section-title {
            font-size: 1em;
            font-weight: 600;
            color: #333;
            margin-top: 20px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }

        .text-danger {
            color: #dc3545;
        }

        .text-success {
            color: #28a745;
        }

        .text-warning {
            color: #ffc107;
        }

        @media (max-width: 1024px) {
            .main-content-wrapper {
                grid-template-columns: 1fr;
            }

            .resizable-divider {
                display: none;
            }

            .control-panel {
                grid-column: 1;
            }

            .content-area {
                grid-column: 1;
            }
        }

        @media (max-width: 768px) {
            .info-panel {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔬 BTC100-2S Spectrometer Diagnostic</h1>
            <p>Real-time spectral data acquisition and visualization via WebSerial</p>
        </div>

        <div class="main-content-wrapper">
            <!-- Control Panel -->
            <div class="control-panel">
                <h2>Connection</h2>
                
                <div class="control-group">
                    <span class="status-indicator disconnected" id="statusIndicator"></span>
                    <span id="connectionStatus">Disconnected</span>
                </div>

                <button id="connectBtn" onclick="connectDevice()">Connect Device</button>
                <button id="disconnectBtn" onclick="disconnectDevice()" disabled style="margin-top: 10px;">Disconnect</button>

                <div class="status-text" id="statusText" style="display: none;">
                    Waiting for device...
                </div>

                <div class="section-title">Diagnostics</div>

                <div class="control-group">
                    <button onclick="sendCommand('Q')">Reset Device</button>
                </div>

                <div class="button-group">
                    <button onclick="sendCommand('a')">ASCII Mode</button>
                    <button onclick="sendCommand('b')">Binary Mode</button>
                </div>

                <div class="control-group">
                    <button onclick="queryValue('A')">Query Average</button>
                    <button onclick="queryValue('I')" style="margin-top: 10px;">Query Integration</button>
                </div>

                <div class="section-title">Settings</div>

                <div class="control-group">
                    <label for="integrationTime">Integration (ms)</label>
                    <input type="number" id="integrationTime" value="100" min="50" max="65000">
                    <button onclick="setSetting('I')" style="margin-top: 10px;">Set Integration</button>
                </div>

                <div class="control-group">
                    <label for="averageCount">Averaging (samples)</label>
                    <input type="number" id="averageCount" value="1" min="1" max="100">
                    <button onclick="setSetting('A')" style="margin-top: 10px;">Set Average</button>
                </div>

                <div class="section-title">Acquisition</div>

                <button id="scanBtn" onclick="performScan()" disabled>Acquire Scan</button>
                <button id="continuousScanBtn" onclick="toggleContinuousScan()" disabled style="margin-top: 10px;">Start Continuous</button>

                <div class="section-title">Log</div>
                <div class="log-container" id="logContainer"></div>
            </div>

            <!-- Resizable Divider -->
            <div class="resizable-divider" id="resizableDivider"></div>

            <!-- Content Area -->
            <div class="content-area">
                <!-- Chart -->
                <div class="chart-container">
                    <h2>Spectral Data</h2>
                    <canvas id="spectrumChart"></canvas>
                </div>

                <!-- Info Panel -->
                <div class="info-panel">
                    <div class="info-card">
                        <h3>Peak Wavelength</h3>
                        <div class="value" id="peakWavelength">—</div>
                        <div class="unit">nm</div>
                    </div>
                    <div class="info-card">
                        <h3>Peak Intensity</h3>
                        <div class="value" id="peakIntensity">—</div>
                        <div class="unit">counts</div>
                    </div>
                    <div class="info-card">
                        <h3>Noise Floor</h3>
                        <div class="value" id="noiseFloor">—</div>
                        <div class="unit">counts</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="spectrometer.js"></script>
</body>
</html>
